name: orchidlife
description: "OrchidLife - Smart orchid care reminders with lux meter and AI help"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.1

  # Notifications & Alarms
  flutter_local_notifications: ^18.0.1
  permission_handler: ^11.3.1

  # Storage
  shared_preferences: ^2.2.2

  # Images
  image_picker: ^1.0.7

  # Lux Meter
  sensors_plus: ^4.0.2

  # AI Handoff (Photo + Voice)
  url_launcher: ^6.2.5
  share_plus: ^7.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  # Isar code generation
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
